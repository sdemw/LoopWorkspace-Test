name: 4. Build Loop
run-name: Build Loop (${{ github.ref_name }})

on:
  workflow_dispatch:

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  TARGET_BRANCH: ${{ github.ref_name }}

jobs:
  check_status:
    runs-on: ubuntu-latest
    name: Validate GitHub token
    steps:
      - name: Validate GH_PAT
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is missing."
            exit 1
          else
            echo "GH_PAT present."
          fi

  check_certs:
    needs: check_status
    name: Check certificates
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  build:
    name: Build LoopInsights
    needs: [check_status, check_certs]
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Select Xcode version
        run: sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ${{ env.TARGET_BRANCH }}

      - name: Checkout LoopInsights branch
        run: |
          cd Loop
          git remote set-url origin https://github.com/TaylorJPatterson/Loop.git
          git fetch origin feat/LoopInsights
          git checkout FETCH_HEAD
          cd ..

      - name: Rename app identity for LoopInsights
        run: |
          sed -i "" 's|MAIN_APP_DISPLAY_NAME = Loop|MAIN_APP_DISPLAY_NAME = LoopInsights|g' Loop/Loop.xcconfig
          sed -i "" 's|MAIN_APP_BUNDLE_IDENTIFIER = com.${DEVELOPMENT_TEAM}.loopkit|MAIN_APP_BUNDLE_IDENTIFIER = com.${DEVELOPMENT_TEAM}.loopinsights|g' Loop/Loop.xcconfig

      - name: Customize Loop
        run: |
          shopt -s nullglob
          patches=(./patches/*.patch)
          if (( ${#patches[@]} )); then
            git apply "${patches[@]}" --allow-empty -v --whitespace=fix
          fi

          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/loopandlearn/lnl-scripts/main/CustomizationSelect.sh)" \
            low_carb_limit \
            now_line \
            lnl_icon \
            profiles

          export SCRIPT_BRANCH=prelim_ai_food
          export PATCH_BRANCH=prelim_ai_food
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/loopandlearn/lnl-scripts/$SCRIPT_BRANCH/CustomizationSelect.sh)" \
            food_search

      - name: Patch Match Tables
        run: |
          TABLE_PRINTER_PATH=$(ruby -e 'puts Gem::Specification.find_by_name("fastlane").gem_dir')/match/lib/match/table_printer.rb
          if [ -f "$TABLE_PRINTER_PATH" ]; then
            sed -i "" "/puts(Terminal::Table.new(params))/d" "$TABLE_PRINTER_PATH"
          fi

      - name: Install dependencies
        run: bundle install

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: Build Loop
        run: bundle exec fastlane build_loop
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload to TestFlight
        run: bundle exec fastlane release
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            artifacts
            buildlog
